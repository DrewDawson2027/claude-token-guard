name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint (ruff)

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.2

      - name: Run ruff
        run: ruff check .

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
        include:
          # Python 3.8 only on Ubuntu/macOS (EOL, not on windows-latest)
          - os: ubuntu-latest
            python-version: "3.8"
          - os: macos-latest
            python-version: "3.8"

    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest hypothesis pytest-benchmark pytest-cov

      - name: Run tests with coverage
        run: |
          # Enable subprocess coverage tracking
          export COVERAGE_PROCESS_START=$PWD/.coveragerc
          export PYTHONPATH=$PWD/tests:$PYTHONPATH
          python3 -m pytest tests/ -v --tb=short --benchmark-disable --cov --cov-report=xml --cov-report=term-missing
        shell: bash

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de  # v5.5.2
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
