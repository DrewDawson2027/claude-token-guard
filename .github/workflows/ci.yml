name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
        include:
          # Python 3.8 only on Ubuntu/macOS (EOL, not on windows-latest)
          - os: ubuntu-latest
            python-version: "3.8"
          - os: macos-latest
            python-version: "3.8"

    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}

    env:
      PYTHONIOENCODING: utf-8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest hypothesis pytest-benchmark pytest-cov

      - name: Run tests with coverage
        run: |
          # Enable subprocess coverage tracking
          export COVERAGE_PROCESS_START=$PWD/.coveragerc
          export PYTHONPATH=$PWD/tests:$PYTHONPATH
          python3 -m pytest tests/ -v --tb=short --benchmark-disable --cov --cov-report=xml --cov-report=term-missing
        shell: bash

      - name: Verify report command
        run: |
          python3 token-guard.py --report || true
        shell: bash

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
