name: Mutation Testing

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC

permissions:
  contents: read

jobs:
  mutate:
    runs-on: ubuntu-latest
    name: Mutation Testing (mutmut)

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest hypothesis pytest-benchmark mutmut

      - name: Run mutation testing
        run: |
          mutmut run --no-progress || true
          echo "=== Mutation Testing Results ==="
          mutmut results
          echo "=== Summary ==="
          mutmut results --summary

      - name: Generate HTML report
        if: always()
        run: |
          mutmut html || true

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: html/
          retention-days: 30

      - name: Upload mutmut cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutmut-cache
          path: .mutmut-cache/
          retention-days: 7
